# Airflow 3.3.0, LocalExecutor.
# Redis/Celery/worker/flower kasitli olarak yok -- tek makinede, tek DAG icin
# gereksiz kaynak tuketimi. Deferrable operator kullanmadigimiz icin
# triggerer da yok; ileride gerekirse eklenir.
#
# Beklenen repo yapisi:
#   BigData-Pipeline-Project/
#     docker/
#       docker-compose-airflow.yml   <- bu dosya
#       Dockerfile.airflow
#       airflow-runtime/{logs,plugins}/  (bos, .gitkeep ile takip edilebilir)
#     dags/            <- Airflow DAG dosyalari
#     dbt_project/      <- dbt modelleri (bronze/silver/gold)
#
# Kurulum (docker/ klasorunun icinden calistir):
#   mkdir -p airflow-runtime/logs airflow-runtime/plugins ../dags ../dbt_project
#   echo "AIRFLOW_UID=$(id -u)" > .env      (Linux/WSL2)
#   docker compose -f docker-compose-airflow.yml build
#   docker compose -f docker-compose-airflow.yml up airflow-init
#   docker compose -f docker-compose-airflow.yml up -d

name: airflow

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-olist_phase3_jwt_secret}
    AIRFLOW__API_AUTH__JWT_ISSUER: ${AIRFLOW__API_AUTH__JWT_ISSUER:-airflow}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # register_gold_tables.py ile ayni varsayilanlar -- Superset refresh task'i bunlari kullanacak
    SUPERSET_URL: http://superset:8088
    SUPERSET_USER: admin
    SUPERSET_PASS: admin
    THRIFT_HOST: spark-thriftserver
    THRIFT_PORT: '10000'
    DBT_PROFILES_DIR: /opt/airflow/dbt_project
  volumes:
    - ../dags:/opt/airflow/dags
    - ./airflow-runtime/logs:/opt/airflow/logs
    - ./airflow-runtime/plugins:/opt/airflow/plugins
    - ../dbt_project:/opt/airflow/dbt_project
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - default
    - bigdata-net
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    networks:
      - default

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    # NOT: LocalExecutor task'lari scheduler process'i icinde calistirir, bu yuzden
    # docker.sock erisimi ve dbt calistirmasi burada gerceklesir.
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -v -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    user: "0:0"

volumes:
  airflow-postgres-db-volume:

networks:
  bigdata-net:
    external: true